services:
  - type: web
    name: learnhub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: '*.vercel.app'
      - key: COOKIE_SAME_SITE
        value: lax
      - key: COOKIE_SECURE
        value: true
      - key: CLOUDINARY_URL
        sync: false